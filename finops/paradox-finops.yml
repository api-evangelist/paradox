meters:
  - name: hires_processed
    description: Hires or applications processed through Olivia (typical HR-tech billable
      unit)
    unit: hire
    aggregation: sum
    dimensions:
      - org
      - location
  - name: messages_sent
    description: SMS / chat conversations handled by Olivia
    unit: message
    aggregation: sum
    dimensions:
      - channel
      - org
  - name: subscription_seats
    description: Recruiter seats with access to Paradox
    unit: seat-month
    aggregation: max
    dimensions:
      - org
principles:
  - name: Visibility
    description: Visibility relies on Paradox reporting dashboards; usage breakdown is contract-
      and tenant-specific.
  - name: Allocation
    description: Allocate by hiring location/org and recruiter team using Paradox's role-based
      access model.
  - name: Optimization
    description: Optimize by routing high-volume requisitions through Olivia automation and
      retiring unused recruiter seats.
  - name: Accountability
    description: Talent-acquisition leader accountable for Paradox spend; reviews at renewal
      against hires/messages realized.
