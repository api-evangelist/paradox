    description: >-
      API for managing interview scheduling within the Paradox platform
      including retrieving multiparty interviewers, interview settings,
      job location rooms, sending interview alerts, and accessing
      interview history.
    image: https://www.paradox.ai/images/paradox-logo.png
    humanURL: https://readme.paradox.ai/reference/send-interview-alerts
    baseURL: https://api.paradox.ai/api/v1/public
    tags:
