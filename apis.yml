    properties:
      - type: Documentation
        url: https://readme.paradox.ai/reference/send-interview-alerts
      - type: API Reference
        url: https://readme.paradox.ai/reference/get-job-location-rooms
      - type: OpenAPI
        url: openapi/paradox-api-openapi.yml
  - name: Paradox Locations API
    description: >-
      API for managing locations within the Paradox platform including
      creating, retrieving, updating, and deleting locations, as well as
      looking up locations by job location code and managing location rooms.
    image: https://www.paradox.ai/images/paradox-logo.png
