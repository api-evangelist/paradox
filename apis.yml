    description: >-
      API for accessing company-level data in Paradox including conversations,
      groups, schools, areas, and AI assistant configuration.
    image: https://www.paradox.ai/images/paradox-logo.png
    humanURL: https://readme.paradox.ai/reference/get-company-conversations
    baseURL: https://api.paradox.ai/api/v1/public
    tags:
      - Conversations
      - Groups
      - Company
