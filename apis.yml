        url: openapi/paradox-api-openapi.yml
  - name: Paradox Candidates API
    description: >-
      API for managing candidates within the Paradox platform including
      creating, retrieving, updating, deleting, and unsubscribing candidates,
      as well as sending candidate messages and scheduling shortlist reviews.
    image: https://www.paradox.ai/images/paradox-logo.png
    humanURL: https://readme.paradox.ai/reference/get-candidates
    baseURL: https://api.paradox.ai/api/v1/public
    tags:
      - Candidates
      - Recruiting
      - Screening
      - Messaging
    properties:
      - type: Documentation
        url: https://readme.paradox.ai/reference/get-candidates
      - type: API Reference
        url: https://readme.paradox.ai/reference/create-candidate
      - type: OpenAPI
        url: openapi/paradox-api-openapi.yml
      - type: JSON Schema
        url: json-schema/paradox-candidate-schema.json
  - name: Paradox Users API
    description: >-
      API for managing users within the Paradox platform including creating,
      retrieving, updating, deleting, deactivating, and reactivating users,
      as well as managing user roles and looking up users by employee ID.
    image: https://www.paradox.ai/images/paradox-logo.png
    humanURL: https://readme.paradox.ai/reference/get-users
    baseURL: https://api.paradox.ai/api/v1/public
    tags:
      - Users
      - Roles
      - Administration
    properties:
      - type: Documentation
        url: https://readme.paradox.ai/reference/get-users
      - type: OpenAPI
        url: openapi/paradox-api-openapi.yml
