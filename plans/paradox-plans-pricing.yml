specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Paradox
providerId: paradox
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: No public pricing — Paradox uses a sales-driven model with categories for Global Enterprise,
  Mid-Sized Businesses, and Franchise. The website routes all pricing inquiries to "Request
  a demo" and the developer portal at readme.paradox.ai is gated.
tags:
  - HR Technology
  - Conversational AI
  - Recruiting
  - Talent Acquisition
  - Hiring Automation
description: Paradox does not publish public pricing. Plans are quoted per customer based
  on segment (Global Enterprise / Mid-Sized / Franchise) with custom proposals after a sales
  demo.
sources:
  - https://www.paradox.ai/pricing
  - https://readme.paradox.ai/
plans:
  - id: paradox-enterprise
    name: Enterprise / Mid-Market / Franchise
    type: enterprise
    description: Sales-quoted Paradox subscription; price varies by segment, hiring volume,
      languages, and required messaging channels.
    entries:
      - label: Annual Subscription
        name: annual_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Olivia Conversational Assistant
      - name: Candidate Screening
      - name: Interview Scheduling
      - name: SMS / Chat / Mobile Channels
      - name: Multi-Language Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
